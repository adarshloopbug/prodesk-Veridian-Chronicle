<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Veridian Chronicle - Premium Digital News & Historical Archive</title>
    <meta name="description" content="Access the Veridian Chronicle digital edition. Explore deep-archive content, read top journalist profiles, and stay up to date with real-time news." />
    <meta name="robots" content="index, follow" />
    
    <!-- Preconnect to Google Fonts for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload Critical LCP Images to resolve LCP request discovery -->
    <!-- Home page LCP image (first article card) -->
    <link 
      rel="preload" 
      href="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=350&q=75" 
      as="image" 
    />
    <!-- Article detail page LCP image (hero image) -->
    <link 
      rel="preload" 
      href="https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=800&q=75" 
      as="image" 
    />

    <!-- Non-render-blocking font stylesheet link -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" 
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link 
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" 
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
